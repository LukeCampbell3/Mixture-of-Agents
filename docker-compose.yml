# =============================================================================
# Mixture-of-Agents CLI — Docker Compose
# =============================================================================
# Quick start (local Ollama):
#   docker compose up ollama
#   docker compose run --rm cli
#
# With GPU:
#   docker compose --profile gpu up ollama-gpu
#   docker compose run --rm cli
#
# Cloud API only (no Ollama):
#   ANTHROPIC_API_KEY=sk-... docker compose run --rm cli-cloud
# =============================================================================

services:

  # ── Ollama (CPU) ─────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: moa-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Ollama (GPU — NVIDIA) ─────────────────────────────────────────────────────
  ollama-gpu:
    image: ollama/ollama:latest
    container_name: moa-ollama-gpu
    profiles: [gpu]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0"
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Model puller — runs once to pull the default model ───────────────────────
  model-pull:
    image: ollama/ollama:latest
    container_name: moa-model-pull
    profiles: [setup]
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    entrypoint: >
      sh -c "
        echo 'Waiting for Ollama...' &&
        until curl -sf http://ollama:11434/api/tags; do sleep 2; done &&
        echo 'Pulling qwen2.5:1.5b...' &&
        ollama pull qwen2.5:1.5b &&
        echo 'Model ready.'
      "
    depends_on:
      ollama:
        condition: service_healthy

  # ── CLI (interactive, connects to local Ollama) ───────────────────────────────
  cli:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: moa-cli
    stdin_open: true
    tty: true
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
      - ./.env:/app/.env:ro
    environment:
      LLM_PROVIDER: ollama
      LLM_MODEL: qwen2.5:1.5b
      OLLAMA_BASE_URL: http://ollama:11434
      BUDGET_MODE: balanced
    depends_on:
      ollama:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── CLI (cloud API — no Ollama needed) ───────────────────────────────────────
  cli-cloud:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: moa-cli-cloud
    profiles: [cloud]
    stdin_open: true
    tty: true
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
      - ./.env:/app/.env:ro
    environment:
      LLM_PROVIDER: "${LLM_PROVIDER:-anthropic}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      BUDGET_MODE: balanced

volumes:
  ollama_data:
    name: moa-ollama-data
